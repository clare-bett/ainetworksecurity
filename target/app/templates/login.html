{% extends "base.html" %}
{% block content %}
<section class="panel narrow">
  <h1>Operator Login</h1>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" class="form">
    <label>
      Username
      <input name="username" autocomplete="off">
    </label>
    <label>
      Password
      <input name="password" type="password">
    </label>
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
